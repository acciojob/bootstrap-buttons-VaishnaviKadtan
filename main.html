<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Buttons</title>
    <!-- Include Bootstrap CSS from a CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-3">Bootstrap Buttons</h1>
        
        <button type="button" class="btn btn-primary">Button 1</button>
        <button type="button" class="btn btn-light">Button 2</button>
        <button type="button" class="btn btn-success">Button 3</button>
        <button type="button" class="btn btn-danger">Button 4</button>

        <div class="my-4 p-3 bg-warning text-center text-dark" style="width: 100%;">
            Button 5
        </div>

        <button type="button" class="btn btn-info">Button 6</button>
        <button type="button" class="btn btn-secondary">Button 7</button>
        <button type="button" class="btn btn-link">Button 8</button>
    </div>
</body>
</html>
