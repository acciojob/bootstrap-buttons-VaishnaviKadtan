<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Buttons Assignment</title>
    <!-- Include Bootstrap CSS from a CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Bootstrap Buttons</h1>
        
        <!-- Button 1: Primary button -->
        <button type="button" id="button-1" class="btn btn-primary">Primary button</button>
        
        <!-- Button 2: Outline secondary button -->
        <button type="button" id="button-2" class="btn btn-outline-secondary">Outline secondary button</button>
        
        <!-- Button 3: Success large button -->
        <button type="button" id="button-3" class="btn btn-success btn-lg">Success large button</button>
        
        <!-- Button 4: Danger small button -->
        <button type="button" id="button-4" class="btn btn-danger btn-sm">Danger small button</button>
        
        <!-- Button 5: Warning large full-screen width button -->
        <!-- In Bootstrap 5, d-grid and gap utilities are used for full-width "block" buttons within a parent container -->
        <div class="d-grid gap-2">
            <button type="button" id="button-5" class="btn btn-warning btn-lg">Warning large full-screen width button</button>
        </div>

        <!-- Button 6: Disabled info button -->
        <button type="button" id="button-6" class="btn btn-info" disabled>Disabled info button</button>
        
        <!-- Button 7: Light button -->
        <button type="button" id="button-7" class="btn btn-light">Light button</button>
        
        <!-- Button 8: Link button -->
        <button type="button" id="button-8" class="btn btn-link">Link button</button>

    </div>

    <!-- Optional: Include Bootstrap JS if you need interactive components (not needed for basic buttons) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
